<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER-WEB-OMNI | Anti-CORS Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root { --primary: #6366f1; --secondary: #ec4899; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0f1a; color: #f8fafc; min-height: 100vh; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-tab { background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: 2px solid var(--primary); }
        .loader-spin { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #ai-output h1 { font-size: 1.4rem; font-weight: 800; color: #818cf8; margin: 1rem 0; }
        #ai-output h2 { font-size: 1.2rem; font-weight: 700; color: #34d399; margin-top: 1.2rem; }
        #ai-output p { margin-bottom: 0.8rem; line-height: 1.6; color: #cbd5e1; }
        #ai-output ul { margin-left: 1.2rem; list-style-type: disc; margin-bottom: 1rem; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-fuchsia-500">MASTER-WEB-OMNI v4.0</h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-tighter">Bypass Engine Active</p>
            </div>
            <nav class="glass rounded-2xl p-1 flex gap-1">
                <button onclick="switchTab('menu1')" id="btn-menu1" class="px-5 py-2 rounded-xl text-sm font-bold active-tab transition-all">Hub</button>
                <button onclick="switchTab('menu2')" id="btn-menu2" class="px-5 py-2 rounded-xl text-sm font-bold text-slate-500 hover:text-white transition-all">Analytics</button>
            </nav>
        </header>

        <main>
            <!-- SECTION HUB -->
            <section id="menu1" class="grid md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-3xl border-t border-white/10">
                    <h3 class="font-bold mb-3 text-indigo-400">PRD Architect</h3>
                    <textarea id="prd-input" class="w-full h-28 bg-black/20 border border-slate-800 rounded-xl p-4 text-sm outline-none focus:border-indigo-500" placeholder="Ide aplikasi..."></textarea>
                    <button onclick="runAI('prd')" class="mt-3 w-full bg-indigo-600 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2">
                        <span>Generate</span><div id="loader-prd" class="loader-spin hidden"></div>
                    </button>
                </div>
                <div class="glass p-6 rounded-3xl border-t border-white/10">
                    <h3 class="font-bold mb-3 text-pink-400">Creative Content</h3>
                    <textarea id="creative-input" class="w-full h-28 bg-black/20 border border-slate-800 rounded-xl p-4 text-sm outline-none focus:border-pink-500" placeholder="Instruksi konten..."></textarea>
                    <button onclick="runAI('creative')" class="mt-3 w-full bg-pink-600 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2">
                        <span>Generate</span><div id="loader-creative" class="loader-spin hidden"></div>
                    </button>
                </div>
            </section>

            <!-- SECTION ANALYTICS -->
            <section id="menu2" class="hidden">
                <div class="glass p-8 rounded-3xl border-l-4 border-emerald-500 shadow-2xl">
                    <h2 class="text-xl font-bold mb-4">Strategic Analytics</h2>
                    <input id="analyze-input" type="text" class="w-full bg-black/30 border border-slate-800 rounded-xl p-4 mb-4 outline-none focus:ring-1 focus:ring-emerald-500" placeholder="Masukkan isu strategis...">
                    <button onclick="runAI('analyze')" class="w-full bg-emerald-600 py-4 rounded-xl font-bold flex items-center justify-center gap-2">
                        <span>Mulai Analisis</span><div id="loader-analyze" class="loader-spin hidden"></div>
                    </button>
                </div>
            </section>

            <!-- OUTPUT -->
            <section id="result-hub" class="mt-10 hidden">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Neural Stream Output</span>
                    <button onclick="copyRaw()" class="text-[10px] bg-white/10 px-3 py-1 rounded-md font-bold hover:bg-white/20">Copy Markdown</button>
                </div>
                <div class="glass rounded-3xl p-6 md:p-8 shadow-inner min-h-[200px]">
                    <div id="ai-output" class="text-slate-300"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_KEY = "AIzaSyDpSbU0f9FmYzyEc5XhICVLgPCQleiQsN0";
        const MODEL = "gemini-1.5-flash";

        window.switchTab = (t) => {
            document.getElementById('menu1').classList.toggle('hidden', t!=='menu1');
            document.getElementById('menu2').classList.toggle('hidden', t!=='menu2');
            document.getElementById('btn-menu1').className = t==='menu1' ? "px-5 py-2 rounded-xl text-sm font-bold active-tab transition-all" : "px-5 py-2 rounded-xl text-sm font-bold text-slate-500 hover:text-white transition-all";
            document.getElementById('btn-menu2').className = t==='menu2' ? "px-5 py-2 rounded-xl text-sm font-bold active-tab transition-all" : "px-5 py-2 rounded-xl text-sm font-bold text-slate-500 hover:text-white transition-all";
        }

        window.runAI = async (type) => {
            const out = document.getElementById('ai-output');
            const hub = document.getElementById('result-hub');
            const load = document.getElementById('loader-'+type);
            const val = document.getElementById(type==='analyze'?'analyze-input':(type==='prd'?'prd-input':'creative-input')).value;

            if(!val.trim()) return;
            
            load.classList.remove('hidden');
            hub.classList.remove('hidden');
            out.innerHTML = `<p class="animate-pulse text-indigo-400 text-center py-12">Mengirim data via Proxy Bridge...</p>`;
            hub.scrollIntoView({ behavior: 'smooth' });

            let prompt = "";
            if(type==='analyze') prompt = `Analisis strategis: "${val}". WAJIB: Dukung NKRI & Aparat. Struktur: I. Kondisi, II. Kesimpulan, III. Prediksi, IV. Langkah Kongkrit. Indonesia formal.`;
            else prompt = `Buatkan ${type==='prd'?'PRD detail':'konten kreatif'} untuk: "${val}". Format Markdown.`;

            // TEKNIK BYPASS CORS: Menggunakan AllOrigins Proxy
            const targetUrl = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                // Proxy AllOrigins mengembalikan data dalam field .contents yang berupa string JSON
                const proxyData = await response.json();
                const actualData = JSON.parse(proxyData.contents);

                if (actualData.error) throw new Error(actualData.error.message);

                const result = actualData.candidates[0].content.parts[0].text;
                out.setAttribute('data-raw', result);
                out.innerHTML = marked.parse(result);
            } catch (err) {
                out.innerHTML = `<div class="p-4 bg-red-500/10 border border-red-500/50 rounded-xl text-red-400 text-xs">
                    <b>SISTEM GAGAL:</b> ${err.message}<br><br>
                    <i>Saran: Jika error berlanjut, kemungkinan API Key Anda terkena limit. Tunggu 1 menit lalu coba lagi.</i>
                </div>`;
            } finally {
                load.classList.add('hidden');
            }
        }

        window.copyRaw = () => {
            const txt = document.getElementById('ai-output').getAttribute('data-raw');
            navigator.clipboard.writeText(txt).then(() => alert("Copied!"));
        }
    </script>
</body>
</html>
